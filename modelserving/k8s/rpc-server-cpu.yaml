kind: ServiceAccount
apiVersion: v1
metadata:
  name: rpc-server

# ---

# kind: Service
# apiVersion: v1
# metadata:
#   name: rpc-server
#   labels:
#     app: rpc-server
# spec:
#   selector:
#     app: rpc-server
#   ports:
#   - port: 80
#     targetPort: 8080
#     protocol: TCP

---

kind: Service
apiVersion: v1
metadata:
  name: rpc-server
  labels:
    app: rpc-server
spec:
  clusterIP: None
  selector:
    app: rpc-server

---

kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: rpc-server
spec:
  podManagementPolicy: "Parallel"
  replicas: 4
  selector:
    matchLabels:
      app: rpc-server
  serviceName: rpc-server
  template:
    metadata:
      labels:
        app: rpc-server
    spec:
      serviceAccountName: rpc-server
      containers:
      - name: rpc-server
        image: rpc-server-cpu:latest # placeholder value, replaced by deployment scripts
        args:
        - --host
        - 0.0.0.0
        - --mem
        - "4192"
